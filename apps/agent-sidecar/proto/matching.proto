syntax = "proto3";
package altrupets.matching;

service MatchingService {
  rpc FindBestRescuers (FindRescuersRequest) returns (FindRescuersResponse);
  rpc RecordRescueOutcome (RecordOutcomeRequest) returns (RecordOutcomeResponse);
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
}

message FindRescuersRequest {
  string rescue_alert_id = 1;
  double latitude = 2;
  double longitude = 3;
  string urgency = 4;  // LOW, MEDIUM, HIGH, CRITICAL
  string animal_type = 5;
  int32 max_candidates = 6;
  string trace_id = 7;
}

message RescuerCandidate {
  string user_id = 1;
  string name = 2;
  double distance_km = 3;
  int32 available_capacity = 4;
  double score = 5;
  string explanation = 6;
  map<string, double> score_breakdown = 7;
}

message FindRescuersResponse {
  repeated RescuerCandidate candidates = 1;
  int32 total_evaluated = 2;
  double duration_ms = 3;
  string trace_id = 4;
}

message RecordOutcomeRequest {
  string rescue_alert_id = 1;
  string rescuer_id = 2;
  string animal_id = 3;
  bool successful = 4;
  string vet_id = 5;
  string trace_id = 6;
}

message RecordOutcomeResponse {
  bool accepted = 1;
}

message HealthCheckRequest {}
message HealthCheckResponse {
  string status = 1;  // SERVING, NOT_SERVING
  map<string, string> dependencies = 2;
}
