journey_acceptance_criteria:
  J1_signup:
    - "El usuario se registra y ve la pantalla de inicio apropiada a su rol en <60 segundos"
    - "El token se renueva automáticamente sin intervención del usuario"

  J4_vet_subsidy:
    - "El rescatista crea solicitud de subsidio con municipalidad auto-detectada en <5 minutos"
    - "El coordinador municipal puede aprobar/rechazar desde el panel web"
    - "Expiración automática si no hay respuesta en las horas configuradas"
    - "Pista de auditoría completa desde la solicitud hasta la resolución"

  J5_abuse_report:
    - "El usuario autenticado presenta reporte con GPS + fotos en <3 minutos"
    - "Código de seguimiento emitido inmediatamente"
    - "El reporte aparece en el panel municipal en 30 segundos"

  J6_casa_cuna:
    - "El rescatista registra casa cuna y agrega animales con fotos/notas médicas"
    - "Lista de necesidades publicada y visible para donantes (efectivo + en especie)"

  J7_municipal_dashboard:
    - "El panel muestra KPIs con alcance de jurisdicción a partir de los datos disponibles"
    - "La cola de subsidios pendientes es accionable (aprobar/rechazar en línea)"
    - "Reporte de transparencia exportable como PDF"

  J9_vet_onboarding:
    - "El veterinario se registra con credenciales profesionales y perfil de clínica"
    - "Aparece en búsquedas por proximidad para rescatistas"
    - "La propuesta de mejora basada en uso aparece al alcanzar el umbral de volumen"

