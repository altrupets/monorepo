# Personas Sintéticas — AltruPets
# Generado: 2026-03-03
# Objetivo: $10K MRR | 10 Personas | 7 Roles de Usuario

ecosystem:
  money_flow: |
    Municipalidades --[$7,500/mes]--> AltruPets (contratos B2G)
    Clínicas Veterinarias ----[$2,000/mes]--> AltruPets (suscripciones)
    Usuarios Avanzados ----[$500/mes]----> AltruPets (funciones premium)
    Donantes --------[$25K/mes]----> Organizaciones de Rescate (directo, NO a través de AltruPets)
    Municipalidades -[$50K/mes]---> Clínicas Veterinarias (subsidios, facilitados por AltruPets)

  value_flow: |
    Centinelas --> reportan animales --> Auxiliares --> rescatan --> Rescatistas --> acogen --> Adoptantes
                                                        |
                                                  Clínicas Veterinarias (atención médica)
                                                        |
                                                  Municipalidades (pagan subsidios)

  vulnerability_chain: |
    Si los rescatistas (P05/P06) abandonan:
      -> no hay casas cuna -> no hay animales en el sistema
      -> no hay listados de adopción -> no hay solicitudes de subsidio
      -> las municipalidades no ven valor -> los ingresos colapsan
    Los rescatistas son el oxígeno de la plataforma aunque paguen $0.

  revenue_anchors:
    - P01_Gabriela: "Compradora municipal, 75% de ingresos"
    - P03_DrCarlos: "Clínica veterinaria pagadora, 18% de ingresos"

  ecosystem_oxygen:
    - P05_Sofia: "Rescatista individual, 0% de ingresos, genera toda la actividad de subsidios/adopciones"
    - P06_Miguel: "Líder de ONG, mayor viralidad (10), trae redes completas"

  top_of_funnel:
    - P07_Andrea: "Centinela, 40% de usuarios, menor nivel de compromiso"

  critical_link:
    - P08_Diego: "Auxiliar, puente entre reportes y rescatistas"

