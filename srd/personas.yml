# Synthetic Personas — AltruPets
# Generated: 2026-03-03
# Target: $10K MRR | 10 Personas | 7 User Roles

ecosystem:
  money_flow: |
    Municipalities --[$7,500/mo]--> AltruPets (B2G contracts)
    Vet Clinics ----[$2,000/mo]--> AltruPets (subscriptions)
    Power Users ----[$500/mo]----> AltruPets (premium features)
    Donors --------[$25K/mo]----> Rescue Orgs (direct, NOT through AltruPets)
    Municipalities -[$50K/mo]---> Vet Clinics (subsidies, facilitated by AltruPets)

  value_flow: |
    Sentinels --> report animals --> Auxiliaries --> rescue --> Rescuers --> foster --> Adopters
                                                      |
                                                Vet Clinics (medical care)
                                                      |
                                                Municipalities (pay subsidies)

  vulnerability_chain: |
    If rescuers (P05/P06) churn:
      -> no foster homes -> no animals in system
      -> no adoption listings -> no subsidy requests
      -> municipalities see no value -> revenue collapses
    Rescuers are the oxygen of the platform even though they pay $0.

  revenue_anchors:
    - P01_Gabriela: "Municipal buyer, 75% revenue"
    - P03_DrCarlos: "Vet clinic payer, 18% revenue"

  ecosystem_oxygen:
    - P05_Sofia: "Individual rescuer, 0% revenue, generates all subsidy/adoption activity"
    - P06_Miguel: "NGO leader, highest virality (10), brings entire networks"

  top_of_funnel:
    - P07_Andrea: "Sentinel, 40% of users, lightest engagement"

  critical_link:
    - P08_Diego: "Auxiliary, bridges reports to rescuers"

